services:
  postgres:
    image: postgres:16-alpine
    container_name: olist-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-olist}
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist_secret}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_schemas.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olist} -d ${POSTGRES_DB:-olist}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: olist-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: dashboard/streamlit/Dockerfile
    container_name: olist-streamlit
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-olist}
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist_secret}
    ports:
      - "8502:8501"
    depends_on:
      postgres:
        condition: service_healthy

  airflow:
    profiles: ["airflow"]
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: olist-airflow
    command: airflow standalone
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      OLIST_PROJECT_ROOT: /opt/olist
      POSTGRES_HOST: olist-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-olist}
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist_secret}
      MLFLOW_TRACKING_URI: sqlite:////opt/olist/mlflow.db
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/olist
      - airflow_data:/opt/airflow
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mlflow_data:
  airflow_data:
